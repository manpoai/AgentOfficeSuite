version: "3.9"

# ────────────────────────────────────────────
#  ASuite — Human-Agent collaboration suite
#  Gateway (Node.js + SQLite) + Shell (Next.js)
#  No external database — everything is in gateway-data volume.
# ────────────────────────────────────────────

networks:
  asuite:
    driver: bridge

volumes:
  gateway-data:

services:

  # ─── ASuite Gateway ─────────────────────
  gateway:
    build: ./gateway
    restart: unless-stopped
    networks: [asuite]
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      GATEWAY_PORT: "4000"
      GATEWAY_DB_PATH: /app/data/gateway.db
      ADMIN_TOKEN: ${GATEWAY_ADMIN_TOKEN}
    volumes:
      - gateway-data:/app/data

  # ─── ASuite Shell (Next.js) ─────────────
  shell:
    build: ./shell
    restart: unless-stopped
    networks: [asuite]
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${SHELL_PORT:-3101}:3101"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${SHELL_URL:-http://localhost:3101}
      NEXTAUTH_SECRET: ${SHELL_SECRET}
      GATEWAY_URL: http://gateway:4000
