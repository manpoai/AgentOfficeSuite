version: "3.9"

# ────────────────────────────────────────────
#  ASuite — Human-Agent 协作套件（拼凑版）
#  Mattermost (IM) + Outline (文档) + Plane (任务)
# ────────────────────────────────────────────

networks:
  asuite:
    driver: bridge

volumes:
  postgres-mm:
  postgres-ol:
  postgres-pl:
  postgres-noco:
  mattermost-data:
  mattermost-logs:
  mattermost-config:
  mattermost-plugins:
  mattermost-client-plugins:
  outline-data:
  minio-data:
  dex-data:
  nocodb-data:
  gateway-data:
  init-data:

services:

  # ─── Mattermost ───────────────────────────
  postgres-mm:
    image: postgres:15-alpine
    restart: unless-stopped
    networks: [asuite]
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: ${POSTGRES_MM_PASS}
      POSTGRES_DB: mattermost
    volumes:
      - postgres-mm:/var/lib/postgresql/data

  mattermost:
    image: mattermost/mattermost-team-edition:9.11
    restart: unless-stopped
    networks: [asuite]
    depends_on: [postgres-mm]
    ports:
      - "${MM_PORT:-8065}:8065"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8065/api/v4/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://mmuser:${POSTGRES_MM_PASS}@postgres-mm:5432/mattermost?sslmode=disable"
      MM_SERVICESETTINGS_SITEURL: "https://mm.gridtabs.com"
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: "true"
      MM_SERVICESETTINGS_ENABLEOAUTHSERVICEPROVIDER: "true"
      MM_PLUGINSETTINGS_ENABLE: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "true"
      # GitLab OAuth via Dex (SSO)
      MM_GITLABSETTINGS_ENABLE: "true"
      MM_GITLABSETTINGS_ID: "mattermost"
      MM_GITLABSETTINGS_SECRET: "mattermost-secret-change-me"
      MM_GITLABSETTINGS_AUTHENDPOINT: "https://asuite.gridtabs.com/dex/auth"
      MM_GITLABSETTINGS_TOKENENDPOINT: "http://dex:5556/dex/token"
      MM_GITLABSETTINGS_USERAPIENDPOINT: "http://dex:5556/dex/userinfo"
      MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS: "false"
      MM_EMAILSETTINGS_SMTPSERVER: ""
      MM_EMAILSETTINGS_REQUIREEMAILVERIFICATION: "false"
      MM_SERVICESETTINGS_ENABLEDEVELOPER: "true"
      MM_SERVICESETTINGS_ENABLETESTING: "true"
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: "true"
    volumes:
      - mattermost-config:/mattermost/config
      - mattermost-data:/mattermost/data
      - mattermost-logs:/mattermost/logs
      - mattermost-plugins:/mattermost/plugins
      - mattermost-client-plugins:/mattermost/client/plugins

  # ─── Outline ──────────────────────────────
  postgres-ol:
    image: postgres:15-alpine
    restart: unless-stopped
    networks: [asuite]
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: ${POSTGRES_OL_PASS}
      POSTGRES_DB: outline
    volumes:
      - postgres-ol:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [asuite]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [asuite]
    ports:
      - "9000:9000"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: "https://minio.gridtabs.com"
    volumes:
      - minio-data:/data

  dex:
    image: dexidp/dex:v2.38.0
    restart: unless-stopped
    networks: [asuite]
    ports:
      - "5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.docker.yaml:ro
      - dex-data:/var/dex
    command: ["dex", "serve", "/etc/dex/config.docker.yaml"]

  outline:
    image: outlinewiki/outline:0.80.2
    restart: unless-stopped
    networks: [asuite]
    depends_on: [postgres-ol, redis, minio, dex]
    ports:
      - "${OUTLINE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      NODE_ENV: production
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      DATABASE_URL: "postgres://outline:${POSTGRES_OL_PASS}@postgres-ol:5432/outline?sslmode=disable"
      PGSSLMODE: disable
      DATABASE_CONNECTION_POOL_MIN: "1"
      DATABASE_CONNECTION_POOL_MAX: "5"
      REDIS_URL: "redis://redis:6379"
      URL: "https://outline.gridtabs.com"
      PORT: "3000"
      FORCE_HTTPS: "false"
      # 文件存储 (MinIO / S3 compatible)
      FILE_STORAGE: s3
      FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_REGION: us-east-1
      AWS_S3_UPLOAD_BUCKET_URL: "https://minio.gridtabs.com"
      AWS_S3_UPLOAD_BUCKET_NAME: outline
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      # OIDC 认证 (Dex)
      OIDC_CLIENT_ID: outline
      OIDC_CLIENT_SECRET: outline-secret-change-me
      OIDC_AUTH_URI: "https://asuite.gridtabs.com/dex/auth"
      OIDC_TOKEN_URI: "http://dex:5556/dex/token"
      OIDC_USERINFO_URI: "http://dex:5556/dex/userinfo"
      OIDC_DISPLAY_NAME: "ASuite Login"
      OIDC_USERNAME_CLAIM: email
      OIDC_SCOPES: "openid profile email"
      ENABLE_UPDATES: "false"
      DEFAULT_LANGUAGE: zh_CN
      DEVELOPMENT_UNSAFE_INLINE_CSP: "true"
    volumes:
      - ./scripts/outline-gen-token.js:/tmp/gen-token.js:ro

  # ─── Plane ────────────────────────────────
  postgres-pl:
    image: postgres:15-alpine
    restart: unless-stopped
    networks: [asuite]
    environment:
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: ${POSTGRES_PL_PASS}
      POSTGRES_DB: plane
    volumes:
      - postgres-pl:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-alpine
    restart: unless-stopped
    networks: [asuite]
    environment:
      RABBITMQ_DEFAULT_USER: plane
      RABBITMQ_DEFAULT_PASS: plane123
      RABBITMQ_DEFAULT_VHOST: plane

  plane-migrator:
    image: makeplane/plane-backend:stable
    restart: on-failure
    networks: [asuite]
    depends_on: [postgres-pl]
    command: /code/bin/docker-entrypoint-migrator.sh
    environment: &plane-env
      DATABASE_URL: "postgresql://plane:${POSTGRES_PL_PASS}@postgres-pl:5432/plane"
      REDIS_URL: "redis://redis:6379"
      AMQP_URL: "amqp://plane:plane123@rabbitmq:5672/plane"
      SECRET_KEY: ${PLANE_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: "https://plane.gridtabs.com,https://asuite.gridtabs.com"
      WEB_URL: "https://plane.gridtabs.com"
      ENABLE_SIGNUP: "1"
      ENABLE_EMAIL_PASSWORD: "1"
      DISABLE_GOOGLE_AUTH: "1"
      DISABLE_GITHUB_AUTH: "1"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      GUNICORN_WORKERS: "2"
      # Storage (MinIO)
      USE_MINIO: "1"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_S3_BUCKET_NAME: "plane-uploads"
      MINIO_ENDPOINT_URL: "http://minio:9000"

  plane-api:
    image: makeplane/plane-backend:stable
    restart: unless-stopped
    networks: [asuite]
    depends_on: [plane-migrator, redis, rabbitmq]
    command: /code/bin/docker-entrypoint-api.sh
    environment: *plane-env

  plane-worker:
    image: makeplane/plane-backend:stable
    restart: unless-stopped
    networks: [asuite]
    depends_on: [postgres-pl, redis, rabbitmq]
    command: /code/bin/docker-entrypoint-worker.sh
    environment: *plane-env

  plane-beat:
    image: makeplane/plane-backend:stable
    restart: unless-stopped
    networks: [asuite]
    depends_on: [postgres-pl, redis, rabbitmq]
    command: /code/bin/docker-entrypoint-beat.sh
    environment: *plane-env

  plane-web:
    image: makeplane/plane-frontend:stable
    restart: unless-stopped
    networks: [asuite]
    depends_on: [plane-api]
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"

  plane-proxy:
    image: nginx:alpine
    restart: unless-stopped
    networks: [asuite]
    depends_on: [plane-api, plane-web]
    ports:
      - "${PLANE_PORT:-8000}:80"
    volumes:
      - ./nginx/plane.conf:/etc/nginx/conf.d/default.conf:ro

  # ─── NocoDB ───────────────────────────────
  nocodb:
    image: nocodb/nocodb:0.202.10
    restart: unless-stopped
    networks: [asuite]
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      NC_DB: "pg://postgres-noco:5432?u=nocodb&p=${POSTGRES_NC_PASS:-nocodb}&d=nocodb"
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-nocodb-jwt-secret-change-me}
      NC_DISABLE_TELE: "true"
      # OIDC via Dex
      NC_OIDC_ISSUER_URL: "https://asuite.gridtabs.com/dex"
      NC_OIDC_CLIENT_ID: "asuite-shell"
      NC_OIDC_CLIENT_SECRET: "shell-secret-change-me"
      NC_OIDC_AUTH_REDIRECT_URL: "https://noco.gridtabs.com"
    depends_on: [postgres-noco]
    volumes:
      - nocodb-data:/usr/app/data

  postgres-noco:
    image: postgres:15-alpine
    restart: unless-stopped
    networks: [asuite]
    environment:
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: ${POSTGRES_NC_PASS:-nocodb}
      POSTGRES_DB: nocodb
    volumes:
      - postgres-noco:/var/lib/postgresql/data

  # ─── ASuite Gateway ─────────────────────
  gateway:
    build: ./gateway
    restart: unless-stopped
    networks: [asuite]
    depends_on:
      mattermost:
        condition: service_healthy
      nocodb:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      GATEWAY_PORT: "4000"
      GATEWAY_DB_PATH: /app/data/gateway.db
      MM_URL: "http://mattermost:8065"
      MM_ADMIN_TOKEN: ${MM_ADMIN_TOKEN:-REPLACE_ME}
      OL_URL: "http://outline:3000"
      OL_TOKEN: ${OL_TOKEN:-REPLACE_ME}
      PLANE_URL: "http://plane-proxy:80"
      PLANE_TOKEN: ${PLANE_TOKEN:-REPLACE_ME}
      PLANE_WORKSPACE: ${PLANE_WORKSPACE:-asuite}
      PLANE_PROJECT_ID: ${PLANE_PROJECT_ID:-REPLACE_ME}
      NOCODB_URL: "http://nocodb:8080"
      NOCODB_EMAIL: ${ADMIN_EMAIL:-admin@asuite.local}
      NOCODB_PASSWORD: ${ADMIN_PASSWORD:-Asuite2026!}
      NOCODB_BASE_ID: ${NOCODB_BASE_ID:-}
      ADMIN_TOKEN: ${GATEWAY_ADMIN_TOKEN:-asuite-admin-secret}
    volumes:
      - gateway-data:/app/data

  # ─── ASuite Shell (Next.js) ─────────────
  shell:
    build: ./shell
    restart: unless-stopped
    networks: [asuite]
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${SHELL_PORT:-3101}:3101"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${SHELL_URL:-http://localhost:3101}
      NEXTAUTH_SECRET: ${SHELL_SECRET:-asuite-shell-secret-change-me}
      DEX_ISSUER: "http://dex:5556/dex"
      DEX_CLIENT_ID: "asuite-shell"
      DEX_CLIENT_SECRET: "shell-secret-change-me"
      NEXT_PUBLIC_MM_URL: ${PUBLIC_MM_URL:-http://localhost:8065}
      NEXT_PUBLIC_OUTLINE_URL: ${PUBLIC_OUTLINE_URL:-http://localhost:3000}
      NEXT_PUBLIC_PLANE_URL: ${PUBLIC_PLANE_URL:-http://localhost:8000}
      NEXT_PUBLIC_NOCODB_URL: ${PUBLIC_NOCODB_URL:-http://localhost:8080}

  # ─── Init Container (runs once) ─────────
  asuite-init:
    image: node:18-alpine
    networks: [asuite]
    depends_on:
      mattermost:
        condition: service_healthy
      nocodb:
        condition: service_healthy
    restart: "no"
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@asuite.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Asuite2026!}
      MM_URL: "http://mattermost:8065"
      NC_URL: "http://nocodb:8080"
      GATEWAY_URL: "http://gateway:4000"
    volumes:
      - ./scripts/docker-init.js:/app/init.js:ro
      - init-data:/data
    working_dir: /app
    command: ["node", "init.js"]
