appId: com.agentofficesuite.app
productName: AOSE
directories:
  output: release
files:
  - electron/**/*
  - gateway/**/*
  - shell-dist/**/*
  - mcp-server/**/*
  # Excludes — explicit and aggressive. Default Electron bundle includes
  # everything matched above; without these the .app balloons to multiple GB
  # because of test data, backup DB files, and dev artifacts.
  - "!**/node_modules/.cache"
  - "!**/.next"
  - "!**/shell"
  - "!**/adapters"
  # Don't `!**/dist` — that nukes npm package build outputs (e.g.
  # node_modules/prosemirror-model/dist/index.js). Only exclude the
  # top-level dist/ which is our own build artifact dir.
  - "!dist"
  - "!**/docs"
  - "!**/*.tgz"
  # Database files (gateway.db, gateway.db.bak-*, gateway.db.backup-*, etc.)
  # — App creates a fresh ~/.aose/data/gateway.db at first launch.
  - "!**/*.db"
  - "!**/*.db-shm"
  - "!**/*.db-wal"
  - "!**/*.db.bak-*"
  - "!**/*.db.backup-*"
  - "!**/*.db.empty-*"
  - "!**/*.db.cleanup-*"
  - "!gateway/gateway.db*"
  # Uploads — user-specific, App writes to ~/.aose/data/uploads/ at runtime.
  - "!gateway/uploads/**"
  - "!gateway/data/**"
  # Dev-only routes / test pages
  - "!shell-dist/editor-test*"
  - "!shell-dist/_next/static/chunks/app/editor-test/**"
  # Miscellaneous build/runtime junk
  - "!**/.next/cache/**"
  - "!**/.git"
  - "!**/.gitignore"
  - "!**/.env*"
  - "!**/coverage/**"
  # Don't `!**/test/**` or `!**/tests/**` — they nuke required npm package
  # files inside node_modules. If we want to slim the build later, do it
  # via package.json `bundleDependencies` or a custom afterPack hook.
  - "!**/*.log"
  - "!**/*.map"
asarUnpack:
  - mcp-server/**/*
  # shell-dist must be unpacked because gateway serves it via express.static
  # and gateway runs as an external Node process (no asar support).
  - shell-dist/**/*
  # node-pty has native .node bindings that can't load from inside asar.
  - "electron/node_modules/node-pty/**/*"
  # Gateway runs as a Node child process. External Node interpreters can't
  # resolve modules from inside .asar archives, so the gateway tree must live
  # on the filesystem next to the .asar. asarUnpack copies these paths into
  # app.asar.unpacked/ which the gateway-manager spawn target can read.
  # Be explicit about node_modules since some asar implementations don't
  # recurse globs into nested package boundaries.
  - "gateway/**/*"
  - "gateway/node_modules/**/*"
  - "gateway/lib/**/*"
  - "gateway/routes/**/*"
  - "gateway/middleware/**/*"
  - "gateway/seed-assets/**/*"
  - "gateway/locales/**/*"
  - "gateway/scripts/**/*"
extraMetadata:
  main: electron/main.js
mac:
  category: public.app-category.productivity
  icon: electron/assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  icon: electron/assets/icon.png
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
linux:
  icon: electron/assets/icon.png
  target:
    - AppImage
    - deb
  category: Office
publish:
  provider: github
  owner: manpoai
  repo: AgentOfficeSuite
